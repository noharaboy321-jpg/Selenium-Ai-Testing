trigger:
  branches:
    include:
      - main
  paths:
    include:
      - AI_validation/test_loginPage.py
      - AI_validation/test_reqres_api_FIXED.py
      - requirements.txt

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.10'
  HEADLESS: '1'

jobs:
- job: SeleniumTests
  displayName: 'Run Selenium Tests'
  steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpecification: '$(pythonVersion)'
      addToPath: true

  - script: |
      python --version
      python -m pip --version
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
      python -m pip list
    displayName: 'Install Python Dependencies'

  - script: |
      sudo apt-get update
      sudo apt-get install -y chromium-browser
      # ensure chromium binary is available as google-chrome for Selenium Manager
      if [ -x "/usr/bin/chromium-browser" ]; then sudo ln -sf /usr/bin/chromium-browser /usr/bin/google-chrome; fi
    displayName: 'Install Chromium (for ChromeDriver)'

  - script: |
      python -m pytest AI_validation/test_loginPage.py AI_validation/test_reqres_api_FIXED.py -v --html=report.html --self-contained-html
    displayName: 'Run Selenium Tests with pytest'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'report.html'
      ArtifactName: 'test-report'
      publishLocation: 'Container'
    condition: succeededOrFailed()
    displayName: 'Publish HTML Report'